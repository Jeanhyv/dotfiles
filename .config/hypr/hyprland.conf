monitor=,preferred,auto,1

exec-once = awww-daemon
exec-once = awww img /home/jean/Imágenes/miku.png
exec-once = waybar
exec-once = nm-applet --indicator

$mainMod = SUPER

# Esto hará que el menú se abra al presionar y soltar SUPER (como en Windows)
bindr = SUPER, SUPER_L, exec, wofi --show drun --allow-images --width 450 --height 500

env = XCURSOR_SIZE,24

general {
    gaps_in = 8
    gaps_out = 15
    border_size = 3
    col.active_border = rgba(ffc0cbff) rgba(ff69b4ff) rgba(7aa2f7ff) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}
decoration {
    rounding = 20
    active_opacity = 1.0
    inactive_opacity = 0.8
    blur {
        enabled = true
        size = 12
        passes = 4
    }
}
# --- ATAJOS PRINCIPALES ---
bind = $mainMod, Q, exec, kitty
bind = $mainMod, B, exec, firefox
bind = $mainMod, R, exec, wofi --show drun --allow-images --width 450 --height 500 --style ~/.config/wofi/style.css
bind = $mainMod, L, exec, wlogout
bind = $mainMod, C, killactive
bind = $mainMod, F, togglefloating
bind = $mainMod, G, togglegroup
bind = $mainMod, A, exec, pkill hyprsunset || hyprsunset --temperature 3000
bind = $mainMod, P, pin
# Mantén presionado Super + Clic Izquierdo para MOVER la ventana
bindm = $mainMod, mouse:272, movewindow

# Mantén presionado Super + Clic Derecho para REDIMENSIONAR la ventana
bindm = $mainMod, mouse:273, resizewindow

# --- MOVER VENTANAS (SWAP) ---
# Super + Shift + Flechas -> Mueve la ventana en esa dirección
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# También con HJKL (estilo Vim/Hacker)
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# --- GESTOS ---
gesture= 3, left,workspace 
gesture=3, right, workspace
gesture=3, down, fullscreen,2 0
gesture=3, up, fullscreen, 0 0

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# --- TECLAS MULTIMEDIA (ThinkPad T14) ---
# --- CONFIGURACIÓN DE AUDIO (F1 - F4) ---

# F1: Silenciar/Activar Audio (Mute)
bind = , F1, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && notify-send -u low -t 1000 -h string:x-dunst-stack-tag:audio "Mute" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@)"
# F2: Bajar Volumen (pasos de 5%)
binde = , F2, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && notify-send -u low -t 1000 -h string:x-dunst-stack-tag:audio "Volumen" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2 * 100 "%"}')"
# F3: Subir Volumen (pasos de 5%, límite 150%)
binde = , F3, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+ && notify-send -u low -t 1000 -h string:x-dunst-stack-tag:audio "Volumen" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2 * 100 "%"}')"
# F4: Silenciar/Activar Micrófono
bind = , F4, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brillo de pantalla
# --- CONFIGURACIÓN DE BRILLO (F5 - F6) ---

# F5: Bajar Brillo
binde = , F5, exec, brightnessctl set 5%- && notify-send -u low -t 1000 -h string:x-dunst-stack-tag:brightness "Brillo" "$(brightnessctl g | awk '{print int($1/255*100) "%"}')"
# F6: Subir Brillo
binde = , F6, exec, brightnessctl set 5%+ && notify-send -u low -t 1000 -h string:x-dunst-stack-tag:brightness "Brillo" "$(brightnessctl g | awk '{print int($1/255*100) "%"}')"
# F7 - Configurar monitores (Proyectar)
bind = , XF86Display, exec, wdisplays

# --- ATAJOS ESTILO WINDOWS ---
bind = $mainMod, E, exec, thunar           # Explorador de archivos (Instala thunar si no lo tienes)
bind = $mainMod, L, exec, swaylock         # Bloquear pantalla (Win + L)
bind = $mainMod, D, exec, wofi --show drun # Mostrar apps (Win + D o Win + R)
bind = CONTROL ALT, Delete, exec, wlogout  # Menú de apagado

# --- CAPTURA DE PANTALLA (PrintScreen) ---
# Guarda la captura en tu carpeta de Imágenes con la fecha actual
bind = , Print, exec, grim -g "$(slurp)" ~/Imágenes/$(date +'%Y-%m-%d_%H-%M-%S').png

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default, slide
}

# Animación del borde
bezier = linear, 0.0, 0.0, 1.0, 1.0
animation = borderangle, 1, 100, linear, loop

exec-once = blueman-applet
